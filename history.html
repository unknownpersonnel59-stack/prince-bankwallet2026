<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transaction History - Bank Wallet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://kit.fontawesome.com/a2e0a6f5e0.js" crossorigin="anonymous"></script>
  </head>

  <body
    class="min-h-screen bg-white dark:bg-black text-gray-900 dark:text-white flex flex-col items-center px-6 py-8"
  >
    <!-- Header -->
    <div class="w-full max-w-md flex items-center justify-between mb-8">
      <button
        onclick="window.location.href='dashboard.html'"
        class="text-green-600 hover:text-green-700 text-lg font-semibold flex items-center gap-2"
      >
        <i class="fa-solid fa-arrow-left"></i> Back
      </button>
      <h1 class="text-xl font-bold">Transaction History</h1>
      <div class="w-6"></div>
    </div>

    <!-- Transaction List -->
    <div
      id="historyList"
      class="w-full max-w-md bg-gray-50 dark:bg-gray-900 rounded-2xl p-4 shadow-md divide-y divide-gray-200 dark:divide-gray-700"
    >
      <!-- Transactions will appear here -->
    </div>

    <!-- Empty State -->
    <div id="emptyState" class="hidden text-center mt-20">
      <i class="fa-solid fa-clock text-5xl text-gray-400 mb-4"></i>
      <p class="text-gray-500 text-lg">No transactions yet</p>
    </div>

    <script>
      // Load transaction history
      const historyList = document.getElementById("historyList");
      const emptyState = document.getElementById("emptyState");

      const transactions =
        JSON.parse(localStorage.getItem("transactionHistory")) || [];

      if (transactions.length === 0) {
        emptyState.classList.remove("hidden");
      } else {
        transactions.reverse().forEach((tx) => {
          const div = document.createElement("div");
          div.className =
            "flex justify-between items-center py-3 text-sm sm:text-base";
          div.innerHTML = `
            <div>
              <p class="font-semibold ${
                tx.type === "Withdrawal" ? "text-red-600" : "text-green-600"
              }">${tx.type}</p>
              <p class="text-gray-500 text-xs">${tx.date}</p>
            </div>
            <div class="text-right">
              <p class="font-bold">${tx.amount}</p>
              <p class="text-gray-500 text-xs">${tx.status}</p>
            </div>
          `;
          historyList.appendChild(div);
        });
      }
    </script>
  </body>
</html>
